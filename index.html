<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e1b4b">
  <title>リベロクイズ — 遊んで深める教養</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ホーム画面 -->
    <section id="screen-home" class="screen active">
      <header class="player-header">
        <div class="avatar">🎓</div>
        <div class="player-info">
          <div class="player-row">
            <span class="player-level">Lv.<span id="home-level">1</span></span>
            <span class="streak-pill" id="home-streak">🔥 0日</span>
          </div>
          <div class="xp-bar"><div class="xp-fill" id="home-xp-fill"></div></div>
          <div class="xp-text" id="home-xp-text">0 / 100 XP</div>
        </div>
      </header>

      <div class="home-hero">
        <h1 class="app-title">リベロクイズ</h1>
        <p class="app-subtitle">1日5問、遊んで深める教養</p>
      </div>

      <div class="card missions-card">
        <h2 class="card-title">📋 デイリーミッション</h2>
        <div id="mission-list"></div>
      </div>

      <button class="btn btn-primary btn-big" id="btn-start">▶ クエストに出発</button>

      <div class="card stats-card">
        <h2 class="card-title">📊 きみの記録</h2>
        <div class="stats-grid" id="home-stats"></div>
      </div>
    </section>

    <!-- 分野マップ画面 -->
    <section id="screen-map" class="screen">
      <header class="screen-header">
        <h1>クエストマップ</h1>
        <p>分野を選んでステージに挑戦しよう</p>
      </header>
      <div id="category-list" class="category-list"></div>
    </section>

    <!-- ステージ選択画面 -->
    <section id="screen-stages" class="screen">
      <header class="screen-header with-back">
        <button class="btn-back" id="btn-stages-back">←</button>
        <h1 id="stages-title">ステージ</h1>
      </header>
      <div id="stage-list" class="stage-list"></div>
    </section>

    <!-- クイズ画面 -->
    <section id="screen-quiz" class="screen">
      <header class="quiz-header">
        <button class="btn-back" id="btn-quiz-quit">✕</button>
        <div class="quiz-progress"><div class="quiz-progress-fill" id="quiz-progress-fill"></div></div>
        <div class="combo-badge hidden" id="combo-badge">🔥 <span id="combo-count">0</span></div>
      </header>
      <div class="quiz-body">
        <div class="quiz-meta" id="quiz-meta"></div>
        <div class="question-card" id="question-card">
          <p id="question-text"></p>
        </div>
        <div class="choices" id="choices"></div>
        <div class="explanation hidden" id="explanation">
          <div class="explanation-verdict" id="explanation-verdict"></div>
          <p id="explanation-text"></p>
          <button class="btn btn-primary" id="btn-next">次へ</button>
        </div>
      </div>
    </section>

    <!-- リザルト画面 -->
    <section id="screen-result" class="screen">
      <div class="result-body">
        <h1 class="result-title" id="result-title">クリア!</h1>
        <div class="result-stars" id="result-stars"></div>
        <div class="result-score" id="result-score"></div>
        <div class="card result-xp-card">
          <div class="xp-gain" id="result-xp">+0 XP</div>
          <div class="xp-bar"><div class="xp-fill" id="result-xp-fill"></div></div>
          <div class="xp-text" id="result-xp-text"></div>
        </div>
        <div class="result-buttons">
          <button class="btn btn-secondary" id="btn-retry">もう一度</button>
          <button class="btn btn-primary" id="btn-continue">つづける</button>
        </div>
      </div>
    </section>

    <!-- 実績画面 -->
    <section id="screen-badges" class="screen">
      <header class="screen-header">
        <h1>実績バッジ</h1>
        <p id="badges-count"></p>
      </header>
      <div id="badge-list" class="badge-list"></div>
    </section>

    <!-- 下部ナビゲーション -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item active" data-screen="screen-home"><span class="nav-icon">🏠</span>ホーム</button>
      <button class="nav-item" data-screen="screen-map"><span class="nav-icon">🗺️</span>クエスト</button>
      <button class="nav-item" data-screen="screen-badges"><span class="nav-icon">🏅</span>実績</button>
    </nav>

    <!-- トースト通知 -->
    <div id="toast-container"></div>

    <!-- レベルアップ演出 -->
    <div id="levelup-overlay" class="hidden">
      <div class="levelup-box">
        <div class="levelup-burst">✨</div>
        <div class="levelup-label">LEVEL UP!</div>
        <div class="levelup-level" id="levelup-level">Lv.2</div>
        <button class="btn btn-primary" id="btn-levelup-close">やったね!</button>
      </div>
    </div>

  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
